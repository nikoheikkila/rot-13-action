name: Build dist

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "package.json"
      - "bun.lock"
      - "Taskfile.yml"
      - "src/**"
      - "bin/**"

permissions:
  contents: read

# Cancel in-progress runs when a new run is triggered
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Rebuild dist
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for committing and pushing rebuilt dist

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          persist-credentials: true # zizmor: ignore[artipacked] Required for pushing commits

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Install Task
        uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0
        with:
          repo-token: ${{ github.token }}
          version: "3.x"

      - name: Install dependencies
        run: task install

      - name: Build dist
        run: task build

      - name: Commit and push if changed
        run: |
          git config user.name "$USERNAME"
          git config user.email "$EMAIL"
          git add dist/
          git diff --staged --quiet || git commit --no-verify -m "chore: rebuild dist"
          git push
        env:
          USERNAME: github-actions[bot]
          EMAIL: github-actions[bot]@users.noreply.github.com
